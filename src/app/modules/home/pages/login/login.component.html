<div class="d-flex justify-content-center align-items-center vh-100 bg-light">
  <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px;">
    
    <div class="text-center mb-4">
      <h3 class="fw-bold">Bentornato</h3>
      <p class="text-muted">Inserisci le tue credenziali</p>
    </div>

    <div class="mb-3">
      <label class="form-label">Username</label>
      <input [(ngModel)]="username" type="text" class="form-control" placeholder="es. mario_rossi">
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input [(ngModel)]="password" type="password" class="form-control" placeholder="••••••••">
    </div>

    <button (click)="login()" class="btn btn-primary w-100 py-2 mt-2">
      Accedi
    </button>

  </div>
</div>
