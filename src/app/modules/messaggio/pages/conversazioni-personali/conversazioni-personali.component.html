<div class="container py-5">
  <div class="d-flex justify-content-between align-items-end mb-4">
    <div>
      <h2 class="fw-bold text-primary mb-0">Messaggi Diretti</h2>
      <p class="text-muted small mb-0">Visualizza le tue conversazioni attive</p>
    </div>
    <button class="btn btn-primary shadow-sm fw-bold px-4 py-2" (click)="nuovaConversazione()">
      <i class="bi bi-plus-lg me-2"></i> Nuova Conversazione
    </button>
  </div>

  <div class="card shadow-sm border-0" style="border-radius: 16px; overflow: hidden;">
    <div class="list-group list-group-flush">
      
      <div *ngFor="let conv of conversazioni" 
           (click)="apriConversazione(conv.id)"
           class="list-group-item list-group-item-action p-3 border-bottom d-flex align-items-center bg-white"
           style="cursor: pointer; transition: all 0.2s;">
        
        <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center me-3" 
             style="width: 48px; height: 48px; min-width: 48px;">
          <span class="text-primary fw-bold text-uppercase">
            {{ conv.usernameUtente2.charAt(0) }}
          </span>
        </div>

        <div class="flex-grow-1">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <h6 class="mb-0 fw-bold text-dark">
              Chat con {{ conv.usernameUtente2 }}
            </h6>
            <span class="badge rounded-pill bg-light text-muted fw-normal">
              {{ conv.creatoIl | date:'dd MMM yyyy' }}
            </span>
          </div>
          <div class="d-flex align-items-center text-muted small">
            <i class="bi bi-person-circle me-1"></i>
            <span>Creato da: {{ conv.usernameUtente1 }}</span>
          </div>
        </div>

        <div class="ms-3 text-secondary opacity-50">
          <i class="bi bi-chevron-right fs-5"></i>
        </div>
      </div>

      <div *ngIf="conversazioni.length === 0" class="text-center py-5 bg-white">
        <div class="mb-3">
          <i class="bi bi-chat-right-quote text-light-emphasis" style="font-size: 3.5rem;"></i>
        </div>
        <h5 class="text-dark fw-bold">Nessun messaggio trovato</h5>
        <p class="text-muted">Inizia una nuova conversazione premendo il tasto in alto.</p>
      </div>

    </div>
  </div>
</div>
