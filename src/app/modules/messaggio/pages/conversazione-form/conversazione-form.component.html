<div class="d-flex justify-content-center align-items-center min-vh-100 bg-light py-5">
  <div class="card shadow-lg p-4 w-100" style="max-width: 550px; border-radius: 12px;">
    
    <div class="text-center mb-4">
      <div class="d-flex justify-content-between align-items-center">
        <button (click)="torna()" class="btn btn-link text-decoration-none p-0">
          <i class="bi bi-chevron-left"></i> Indietro
        </button>
        <h4 class="fw-bold text-primary m-0">Nuova Chat</h4>
        <div style="width: 60px;"></div> </div>
      <p class="text-muted small mt-2">Scegli con chi vuoi iniziare a parlare</p>
    </div>

    <div class="overflow-auto mb-4" style="max-height: 350px;">
      <div class="list-group list-group-flush border rounded">
        
        <button *ngFor="let utente of utentiDisponibili" 
                (click)="creaConversazione(utente.id)"
                class="list-group-item list-group-item-action d-flex align-items-center py-3 border-bottom">
          
          <div class="rounded-circle bg-primary bg-opacity-10 d-flex align-items-center justify-content-center me-3" 
               style="width: 40px; height: 40px; min-width: 40px;">
            <i class="bi bi-person text-primary"></i>
          </div>

          <div class="flex-grow-1 text-start">
            <span class="fw-bold text-dark">{{ utente.username }}</span>
          </div>

          <i class="bi bi-plus-circle text-muted"></i>
        </button>

        <div *ngIf="utentiDisponibili.length === 0" class="p-5 text-center">
          <i class="bi bi-people fs-1 text-secondary opacity-25"></i>
          <p class="text-muted mt-2">Nessun utente trovato.</p>
        </div>

      </div>
    </div>

    <button type="button" (click)="torna()" class="btn btn-outline-secondary w-100 py-2 fw-bold">
      Annulla
    </button>

  </div>
</div>
