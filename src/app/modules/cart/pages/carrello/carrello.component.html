<div class="container py-5">
  <div class="text-center mb-5 p-4 bg-white rounded-4 shadow-sm border">
    <h2 class="fw-bold text-dark mb-2">Il Tuo Carrello</h2>
    <p class="text-secondary mb-4">
      Hai selezionato <span class="fw-bold text-dark">{{ listaCarrello.length }}</span> prodotti
    </p>
    
    <button class="btn shadow-sm px-5 py-2 fw-bold text-dark rounded-pill border-0" 
            style="background: linear-gradient(to bottom, #f7dfa5, #f0c14b); border: 1px solid #a88734 !important; font-size: 1.1rem;">
      Procedi al Pagamento
    </button>
    
    <div class="mt-3">
      <small class="text-muted">
        <i class="bi bi-lock-fill"></i> Transazione sicura e protetta
      </small>
    </div>
  </div>

  <div class="row row-cols-1 row-cols-md-3 g-4">
    <div class="col" *ngFor="let item of listaCarrello">
      <app-oggetto-carrello 
        [dati]="item"
        (onElimina)="gestisciEliminazione($event)">
      </app-oggetto-carrello>
    </div>
  </div>
</div>
