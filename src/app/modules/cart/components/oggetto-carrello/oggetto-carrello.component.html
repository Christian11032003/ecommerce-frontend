<div class="card h-100 shadow-sm border-1">
  <div class="card-body">
    <h5 class="card-title fw-bold text-dark mb-2">
      {{ dati.prodotto.nome }}
    </h5>
    
    <p class="card-text text-secondary mb-3">
      {{ dati.prodotto.descrizione }}
    </p>
    
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div class="d-flex flex-column" style="max-width: 120px;">
        <label class="small text-muted mb-1">Quantità: {{dati.quantita}}</label>
          Disponibile: {{ dati.prodotto.quantita }}
      </div>
      
      <div class="text-end">
        <div class="fw-bold text-success fs-5">
          {{ dati.prodotto.prezzo | currency:'EUR' }}
        </div>
      </div>
    </div>
  </div>

  <div class="card-footer bg-white border-top-0 d-flex gap-2 pb-3">
    
    <button class="btn btn-outline-danger btn-sm flex-grow-1" (click)="elimina()">
      <i class="bi bi-trash"></i> Elimina
    </button>
  </div>
</div>
