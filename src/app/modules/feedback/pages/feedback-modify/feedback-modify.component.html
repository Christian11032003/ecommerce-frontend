<div class="d-flex justify-content-center align-items-center min-vh-100 bg-light py-5">
  <div class="card shadow-lg p-4" style="width: 100%; max-width: 550px; border-radius: 12px;">
    
    <div class="text-center mb-4">
      <h3 class="fw-bold text-primary">Lascia un Feedback</h3>
      <p class="text-muted small">La tua opinione è importante per noi</p>
    </div>

    <form #feedbackForm="ngForm" (ngSubmit)="modificaFeedback()">
      
      <div class="mb-4 text-center">
        <label class="form-label d-block fw-semibold text-dark mb-2">Valutazione</label>
        <div class="d-flex justify-content-center gap-2">
          <div *ngFor="let stella of [1,2,3,4,5]" 
               (click)="request.valutazione = stella" 
               class="fs-2 transition-all" 
               [ngClass]="request.valutazione >= stella ? 'text-warning' : 'text-secondary opacity-25'"
               style="cursor: pointer;">
            ★
          </div>
        </div>
        <input type="hidden" name="valutazione" [(ngModel)]="request.valutazione" required min="1">
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold text-dark">La tua esperienza</label>
        <textarea name="descrizione" [(ngModel)]="request.descrizione" 
                  class="form-control px-3" 
                  rows="4" placeholder="Raccontaci cosa ne pensi..." required></textarea>
      </div>

        <div class="mt-4">
    <button type="submit" [disabled]="!feedbackForm.valid || request.valutazione === 0" 
            class="btn btn-warning w-100 py-2 shadow-sm fw-bold mb-3 text-dark">
        <i class="bi bi-send me-1" (click)="modificaFeedback()"></i> Invia Feedback
    </button>
    
    <button type="button" [routerLink]="['/i-miei-prodotti']" 
            class="btn btn-outline-secondary w-100 py-2 fw-bold">
        Annulla e Torna Indietro
    </button>
    </div>

    </form>
  </div>
</div>
