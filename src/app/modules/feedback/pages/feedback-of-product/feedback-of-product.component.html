<div class="d-flex flex-column align-items-center min-vh-100 bg-light py-5 px-3">
  
  <div class="text-center mb-5">
    <h2 class="fw-bold text-primary">Recensioni degli Utenti</h2>
    <p class="text-muted">Scopri cosa dicono gli altri acquirenti di questo prodotto</p>
    <button [routerLink]="['/prodotti-in-vendita']" class="btn btn-sm btn-outline-primary rounded-pill px-3">
      <i class="bi bi-arrow-left me-1"></i> Torna allo Shop
    </button>
  </div>

  <div *ngIf="feedbacks.length === 0" class="card shadow-sm p-4 text-center" style="max-width: 550px; width: 100%; border-radius: 12px;">
    <div class="text-secondary mb-2 fs-1">
      <i class="bi bi-chat-dots"></i>
    </div>
    <p class="mb-0">Non ci sono ancora feedback per questo prodotto. Sii il primo a recensirlo!</p>
  </div>

  <div class="w-100" style="max-width: 600px;">
    <div *ngFor="let f of feedbacks" class="card shadow-lg border-0 mb-4 p-3" style="border-radius: 12px;">
      <div class="card-body">
        
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="d-flex align-items-center">
            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold shadow-sm" 
                 style="width: 45px; height: 45px; font-size: 1.2rem;">
              {{ f.username.charAt(0).toUpperCase() }}
            </div>
            <div class="ms-3">
              <h6 class="mb-0 fw-bold text-dark">@{{ f.username }}</h6>
              <small class="text-muted opacity-75">Acquirente Verificato</small>
            </div>
          </div>

          <div class="d-flex gap-1">
            <span *ngFor="let stella of [1,2,3,4,5]" 
                  class="fs-5" 
                  [ngClass]="f.valutazione >= stella ? 'text-warning' : 'text-secondary opacity-25'">
              ★
            </span>
          </div>
        </div>

        <hr class="opacity-25">

        <div class="mt-3">
          <p class="text-dark lh-base" style="font-style: italic;">
            "{{ f.descrizione }}"
          </p>
        </div>

      </div>
    </div>
  </div>
</div>
