<div class="card h-100 shadow-sm border-1">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <h6 class="card-title fw-bold text-dark mb-0 text-truncate" style="max-width: 70%;">
        {{ prodottoVendita.nome }}
      </h6>
      <span class="badge rounded-pill bg-info text-dark x-small">
        <i class="bi bi-person"></i> {{ prodottoVendita.username }}
      </span>
    </div>
    
    <p class="card-text text-secondary mb-3 small" style="font-size: 0.85rem;">
      {{ prodottoVendita.descrizione }}
    </p>
    
    <div class="d-flex justify-content-between align-items-center mb-0">
      <span class="text-muted small">
        Prezzo d'acquisto:
      </span>
      <span class="fw-bold text-success">
        {{ prodottoVendita.prezzo | currency: "EUR"}}
      </span>
    </div>
  </div>

  <div class="card-footer bg-white border-top-0 pb-3">
    <button class="btn btn-warning btn-sm w-100 fw-bold shadow-sm text-dark" 
            [routerLink]="['/add-feedback', prodottoVendita.id]">
      <i class="bi bi-star-fill me-1"></i> Lascia Recensione
    </button>
  </div>
</div>
