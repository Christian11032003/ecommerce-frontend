<div class="card h-100 shadow-sm border-1">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <h6 class="card-title fw-bold text-dark mb-0 text-truncate" style="max-width: 70%;">
        {{ prodottoVendita.nome }}
      </h6>
      <span class="badge rounded-pill bg-info text-dark x-small">
        <i class="bi bi-person"></i> {{ prodottoVendita.username }}
      </span>
    </div>
    
    <p class="card-text text-secondary mb-3 small" style="font-size: 0.85rem;">
      {{ prodottoVendita.descrizione }}
    </p>
    
    <div class="d-flex justify-content-between align-items-center mb-3">
      <span class="badge bg-light text-dark border">
        Disp: {{ prodottoVendita.quantita }}
      </span>
      <span class="fw-bold text-success">
        {{ prodottoVendita.prezzo | currency:'EUR' }}
      </span>
    </div>

    <div class="d-flex align-items-center gap-2 mb-2">
      <label class="small text-muted mb-0">Q.tà:</label>
      <input type="number" 
             class="form-control form-control-sm text-center" 
             style="width: 60px;"
             [(ngModel)]="quantitaSelezionata"
              min="1" 
             [max]="prodottoVendita.quantita">
    </div>
  </div>

  <div class="card-footer bg-white border-top-0 d-flex gap-2 pb-3">
    <button class="btn btn-primary btn-sm flex-grow-1" 
            [disabled]="quantitaSelezionata > prodottoVendita.quantita || quantitaSelezionata < 1"
            (click)="aggiungiAlCarrello()">
      <i class="bi bi-cart-plus"></i> Aggiungi
    </button>

    <button class="btn btn-warning btn-sm flex-grow-1 text-dark" 
              [routerLink]="['/feedback-of-product', prodottoVendita.id]">
        <i class="bi bi-chat-left-text"></i> Mostra feedback
    </button>
  </div>
</div>
