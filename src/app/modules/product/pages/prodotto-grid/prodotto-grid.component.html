<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>I Miei Prodotti</h2>
    <a class="btn btn-success" routerLink="/add-prodotto">
      <i class="bi bi-plus-lg"></i> Aggiungi Nuovo Prodotto
    </a>
  </div>

  <hr>

  <div *ngIf="isLoading" class="d-flex justify-content-center my-5">
    <div class="text-center">
      <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
        <span class="visually-hidden">Caricamento...</span>
      </div>
      <p class="mt-2 text-muted">Caricamento prodotti in corso...</p>
    </div>
  </div>

  <div class="row" *ngIf="!isLoading">
    
    <div *ngIf="prodotti.length === 0" class="col-12 text-center">
      <p class="alert alert-info">Nessun prodotto disponibile.</p>
    </div>

    <div class="col-md-4 mb-4" *ngFor="let p of prodotti">
      <app-prodotto 
        [prodotto]="p" 
        (onElimina)="gestisciEliminazione($event)">
      </app-prodotto>
    </div>
    
  </div>
</div>
